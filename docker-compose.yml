version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: nestjs-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestjs_saas
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    expose:
    - "5432"
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nestjs-saas-mailhog
    restart: unless-stopped
    expose:
    - "1025"
    - "8025"
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs-saas-api
    restart: unless-stopped
    env_file:
    - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_saas
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      RUN_SEED: ${RUN_SEED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
    - full
    expose:
    - "3000"
volumes:
  postgres_data:
